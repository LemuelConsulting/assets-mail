<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" role="img" aria-label="Intelligent Service Center Solutions">
  <defs>
    <linearGradient id="iscGrad" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#7C2FBE"/>
      <stop offset="40%" stop-color="#5B5BD6"/>
      <stop offset="100%" stop-color="#2D9CDB"/>
    </linearGradient>
  </defs>

  <!-- Bulle de dialogue segmentée -->
  <g>
    <circle cx="360" cy="100" r="58" fill="none" stroke="url(#iscGrad)" stroke-width="26"
            stroke-dasharray="62 10.9" transform="rotate(-80 360 100)"/>
    <!-- Queue de la bulle (bas gauche) -->
    <path d="M 297 170 L 314 126 Q 332 150 358 157 Z" fill="url(#iscGrad)"/>
  </g>

  <!-- Intitulé -->
  <text x="360" y="230" text-anchor="middle"
        font-family="Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="500" letter-spacing="6">
    <tspan fill="#1F1E1B">INTELLIGENT </tspan><tspan fill="#5C5C5C">SERVICE CENTER</tspan>
  </text>
  <text x="360" y="272" text-anchor="middle"
        font-family="Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="400" letter-spacing="11" fill="#8A8A8A">SOLUTIONS</text>
</svg>
